<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>InnovateDAO 极简前端测试</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; }
        input { width: 300px; padding: 10px; font-size: 16px; margin: 10px; }
        #status, #proposeStatus { margin-top: 20px; font-weight: bold; color: #333; }
        .section { margin: 30px 0; padding: 20px; border: 1px solid #eee; border-radius: 10px; background-color: #fcfcfc;}
    </style>
</head>
<body>

    <h1>🏛️ InnovateDAO 学生孵化基金</h1>
    
    <div class="section">
        <button id="connectBtn">1. 连接钱包</button>
        <button id="mintBtn" disabled>2. 领取 DAO 门票 (NFT) 并激活票权</button>
        <p id="status">请先连接钱包...</p>
    </div>

    <div class="section">
        <h2>💡 发起资金提案</h2>
        <input type="text" id="descInput" placeholder="输入提案描述 (例如: 买一栋楼)">
        <button id="proposeBtn" disabled>3. 缴纳 0.1 ETH 发起提案</button>
        <p id="proposeStatus"></p>
    </div>

    <script>
        // 填入你刚才部署的合约地址
        const nftAddress = "0x5FbDB2315678afecb367f032d93F642f64180aa3";
        const governorAddress = "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512";
        
        // 极简魔法：人类可读 ABI
        const nftAbi = [
            "function safeMint(address to) public",
            "function delegate(address delegatee) public",
            "function balanceOf(address owner) view returns (uint256)"
        ];
        
        const governorAbi = [
            "function proposeWithDeposit(address[] targets, uint256[] values, bytes[] calldatas, string description) public payable returns (uint256)"
        ];

        let signer;
        let nftContract;
        let governorContract;

        // 按钮 1：连接 MetaMask
        document.getElementById("connectBtn").onclick = async () => {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    signer = await provider.getSigner();
                    
                    // 统一在这里初始化两个合约
                    nftContract = new ethers.Contract(nftAddress, nftAbi, signer);
                    governorContract = new ethers.Contract(governorAddress, governorAbi, signer);
                    
                    document.getElementById("status").innerText = "✅ 钱包已连接: " + signer.address;
                    
                    // 钱包连接成功后，同时解锁发门票和发起提案的按钮
                    document.getElementById("mintBtn").disabled = false;
                    document.getElementById("proposeBtn").disabled = false;
                } catch (err) {
                    console.error(err);
                    document.getElementById("status").innerText = "❌ 连接失败或被拒绝";
                }
            } else {
                alert("请先在浏览器安装 MetaMask 插件！");
            }
        };

        // 按钮 2：交互智能合约 (铸造 NFT + 委托)
        document.getElementById("mintBtn").onclick = async () => {
            try {
                document.getElementById("status").innerText = "⏳ 正在向区块链发送铸造请求，请在钱包中确认...";
                const tx1 = await nftContract.safeMint(signer.address);
                await tx1.wait(); 
                
                document.getElementById("status").innerText = "⏳ 门票已到手！正在激活投票权...";
                const tx2 = await nftContract.delegate(signer.address);
                await tx2.wait();
                
                document.getElementById("status").innerText = "🎉 成功！你现在拥有了 InnovateDAO 的投票权！";
            } catch (err) {
                console.error(err);
                document.getElementById("status").innerText = "❌ 交易失败 (你可能已经领过票了，请按 F12 查看报错)";
            }
        };

        // 按钮 3：发起提案并缴纳押金
        document.getElementById("proposeBtn").onclick = async () => {
            const desc = document.getElementById("descInput").value;
            if (!desc) {
                alert("老板，请先输入提案描述再点发起呀！");
                return;
            }

            try {
                document.getElementById("proposeStatus").innerText = "⏳ 正在唤起钱包，请确认支付 0.1 ETH 押金...";
                
                const targets = [signer.address];
                const values = [0]; 
                const calldatas = ["0x"];
                
                // 核心逻辑：发起提案并携带 0.1 ETH 押金
                const depositAmount = ethers.parseEther("0.1");
                const tx = await governorContract.proposeWithDeposit(targets, values, calldatas, desc, {
                    value: depositAmount
                });
                
                document.getElementById("proposeStatus").innerText = "⏳ 交易已发送，等待区块链打包确认中...";
                await tx.wait(); // 等待上链
                
                document.getElementById("proposeStatus").innerText = "✅ 提案发起成功！0.1 ETH 押金已锁定在金库！";
            } catch (err) {
                console.error(err);
                document.getElementById("proposeStatus").innerText = "❌ 提案失败，请检查控制台 (确认钱包里有没有钱，或者网络是否正常)。";
            }
        };
    </script>
</body>
</html>
